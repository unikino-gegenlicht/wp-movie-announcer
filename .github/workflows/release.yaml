name: Release Plugin
on: push

env:
  PLUGIN_NAME: wp-movie-announcer

jobs:
  create-archive:
    runs-on: ubuntu-latest
    steps:

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: wp-cli,composer

      - name: Checkout Sources
        uses: actions/checkout@v4

      - name: Create License Artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: licensing-info
          path: LICENSE

      - name: Create Directory Structure and Archive
        shell: bash
        run: |
          composer install
          rm LICENSE
          rm README.md
          mkdir ${{ env.PLUGIN_NAME }}
          shopt -s extglob
          mv !(${{ env.PLUGIN_NAME }}|.git|.github) ${{ env.PLUGIN_NAME }}/
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}/*

      - name: Create Release Artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: ${{ env.PLUGIN_NAME }}.zip
          retention-days: 1

      - name: Create Artifact
        if: startsWith(github.ref, 'refs/heads/')
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: ${{ env.PLUGIN_NAME }}.zip
          retention-days: 7

  release-archive:

    permissions:
      contents: write

    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - create-archive
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Add Tag to Archive
        run: |
          mv ${{ env.PLUGIN_NAME }}.zip  ${{ env.PLUGIN_NAME }}.${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          draft: true
          files: |
            ${{ env.PLUGIN_NAME }}.${{ github.ref_name }}.zip
            LICENSE
